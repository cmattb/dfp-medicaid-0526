  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

7a;\n  --d-mid:   #efe7d3;\n  --d-pos-1: #88b3a7;\n  --d-pos-2: #4c8a82;\n  --d-pos-3: #1f5a5a;\n\n  /* Alt diverging palette — red ↔ ivory ↔ green (classic) */\n  --rg-neg-3: #9b2c2c;\n  --rg-neg-2: #c25450;\n  --rg-neg-1: #e7a3a0;\n  --rg-mid:   #f1ebde;\n  --rg-pos-1: #8fc4a4;\n  --rg-pos-2: #4a9268;\n  --rg-pos-3: #1f5a3a;\n\n  /* Active palette — re-bound by [data-palette] on <html> */\n  --neg-3: var(--d-neg-3);\n  --neg-2: var(--d-neg-2);\n  --neg-1: var(--d-neg-1);\n  --mid:   var(--d-mid);\n  --pos-1: var(--d-pos-1);\n  --pos-2: var(--d-pos-2);\n  --pos-3: var(--d-pos-3);\n}\n\nhtml[data-palette=\"redgreen\"] {\n  --neg-3: var(--rg-neg-3);\n  --neg-2: var(--rg-neg-2);\n  --neg-1: var(--rg-neg-1);\n  --mid:   var(--rg-mid);\n  --pos-1: var(--rg-pos-1);\n  --pos-2: var(--rg-pos-2);\n  --pos-3: var(--rg-pos-3);\n\n  --warn:    #a7541f;\n\n  --serif: \"Lexend\", system-ui, sans-serif;\n  --sans:  \"Atkinson Hyperlegible\", system-ui, sans-serif;\n  --mono:  \"Atkinson Hyperlegible\", system-ui, sans-serif;\n}\n\n/* Anywhere we used to use the mono font for numerals, keep numbers tabular so columns align */\n.bar-value, .axis-tick, .zero-label,\n.heat-table, .heat-cell, .row-topline,\n.detail-panel .topline-num, .detail-panel .ranked-row .val,\n.pair-card .pair-head .gap-num, .pair-msg .msg-row .score,\n.finding-item .big-num, .finding-item .body .subgroup-strip .chip,\n.rank-card .rank-num, .rank-card .score-col .score, .rank-card .score-col .delta,\n.rank-pivot .pivot-status, .rank-pivot button.chip .n,\n.page-head .meta-row, .heat-legend, .legend, .legend .legend-ticks,\n.tooltip .tip-score, .tooltip .tip-meta {\n  font-variant-numeric: tabular-nums;\n  font-feature-settings: \"tnum\";\n}\n\n* { box-sizing: border-box; }\nhtml, body { margin: 0; padding: 0; }\nbody {\n  background: var(--bg);\n  color: var(--ink);\n  font-family: var(--serif);\n  font-size: 18px;\n  line-height: 1.5;\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n}\nh1, h2, h3, h4, h5 { font-family: var(--sans); font-weight: 700; letter-spacing: 0; margin: 0; color: var(--ink); }\nbutton { font-family: inherit; cursor: pointer; }\na { color: inherit; }\n\n.skip-link {\n  position: fixed;\n  top: 12px;\n  left: 12px;\n  z-index: 100000;\n  padding: 9px 13px;\n  background: var(--ink);\n  color: #fff;\n  border-radius: 4px;\n  transform: translateY(-160%);\n}\n.skip-link:focus { transform: none; }\n\n.sr-only {\n  position: absolute !important;\n  width: 1px !important;\n  height: 1px !important;\n  padding: 0 !important;\n  margin: -1px !important;\n  overflow: hidden !important;\n  clip: rect(0, 0, 0, 0) !important;\n  white-space: nowrap !important;\n  border: 0 !important;\n}\n\n:focus-visible {\n  outline: 3px solid var(--focus);\n  outline-offset: 3px;\n}\n\n/* ---------- Page shell ---------- */\n.shell {\n  max-width: 1760px;\n  margin: 0 auto;\n  padding: 28px 36px 56px;\n}\n@media (max-width: 720px) { .shell { padding: 18px 14px 40px; } .bar-label { font-size: 11.5px; } }\n\n.eyebrow {\n  font-family: var(--mono);\n  font-size: 13px;\n  letter-spacing: 0.12em;\n  text-transform: uppercase;\n  color: var(--ink-3);\n}\n\nheader.page-head { margin-bottom: 18px; }\n.page-head h1 {\n  font-size: clamp(24px, 3.4vw, 34px);\n  line-height: 1.15;\n  margin: 6px 0 6px;\n}\n.page-head .subhead {\n  font-size: 18px;\n  color: var(--ink-2);\n  max-width: 70ch;\n  margin: 0;\n}\n.page-head .meta-row {\n  display: flex; flex-wrap: wrap; gap: 18px;\n  margin-top: 14px;\n  font-size: 17.5px;\n  color: var(--ink);\n  font-family: var(--mono);\n}\n.page-head .meta-row span { display: inline-flex; align-items: center; gap: 6px; }\n.page-head .meta-row b { font-weight: 700; color: var(--ink); }\n.page-head .contact-row {\n  margin-top: 8px;\n  font-size: 22.5px;\n  color: var(--ink);\n  font-family: var(--mono);\n}\n.page-head .contact-row a { color: var(--ink); text-decoration: underline; text-underline-offset: 2px; font-style: italic; }\n\n/* ---------- Tab bar ---------- */\nnav.tabs {\n  display: flex;\n  gap: 2px;\n  margin: 22px 0 18px;\n  border-bottom: 1px solid var(--rule);\n  overflow-x: auto;\n  scrollbar-width: thin;\n}\nnav.tabs button {\n  background: transparent;\n  border: 0;\n  border-bottom: 2px solid transparent;\n  padding: 12px 16px;\n  font-family: var(--sans);\n  font-size: 17px;\n  font-weight: 600;\n  color: var(--ink-3);\n  white-space: nowrap;\n  transition: color 0.12s, border-color 0.12s;\n  margin-bottom: -1px;\n}\nnav.tabs button:hover { color: var(--ink); }\nnav.tabs button:focus-visible {\n  outline-offset: -4px;\n  background: var(--surface);\n}\nnav.tabs button[aria-selected=\"true\"] {\n  color: var(--ink);\n  border-bottom-color: var(--ink);\n}\nnav.tabs .tab-num {\n  font-family: var(--mono);\n  font-size: 13px;\n  color: var(--ink-3);\n  margin-right: 8px;\n  font-weight: 500;\n}\n\n/* ---------- View containers ---------- */\n.view { display: none; }\n.view.active { display: block; animation: fade 0.18s ease-out; }\n@keyframes fade { from { opacity: 0; transform: translateY(2px); } to { opacity: 1; transform: none; } }\n\n.view-head {\n  margin-bottom: 18px;\n  display: flex; align-items: flex-end; justify-content: space-between; gap: 18px; flex-wrap: wrap;\n}\n.view-head > div { flex: 1 1 100%; min-width: 0; }\n.view-head h2 { font-size: 26.5px; }\n.view-head .desc { color: var(--ink-2); max-width: none; margin-top: 4px; text-wrap: pretty; }\n.view-head .controls { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }\n\n/* Survey prompt shown above the full-text list */\n.survey-prompt {\n  background: var(--surface);\n  border: 1px solid var(--rule);\n  border-left: 3px solid var(--ink-2);\n  border-radius: 4px;\n  padding: 18px 22px;\n  margin-bottom: 20px;\n}\n.survey-prompt .sp-label {\n  font-family: var(--sans);\n  font-size: 13px;\n  letter-spacing: 0.08em;\n  text-transform: uppercase;\n  color: var(--ink-3);\n  margin-bottom: 10px;\n}\n.survey-prompt p {\n  color: var(--ink-2);\n  line-height: 1.6;\n  margin: 0 0 10px;\n  text-wrap: pretty;\n}\n.survey-prompt p:last-child { margin-bottom: 0; }\n\n/* ---------- Topline view ---------- */\n.bars-wrap {\n  background: var(--panel);\n  border: 1px solid var(--rule);\n  border-radius: 6px;\n  padding: 22px 26px 18px;\n  box-shadow: var(--shadow);\n}\n.bars-svg { width: 100%; height: auto; display: block; }\n.bar-item { cursor: pointer; }\n.bar-rect {\n  forced-color-adjust: none;\n  -ms-high-contrast-adjust: none; transition: opacity 0.12s; }\n.bar-item:hover .bar-rect {\n  forced-color-adjust: none;\n  -ms-high-contrast-adjust: none; opacity: 0.78; }\n.bar-item:focus-visible .bar-rect {\n  forced-color-adjust: none;\n  -ms-high-contrast-adjust: none;\n  stroke: var(--focus);\n  stroke-width: 3;\n}\n.bar-item:focus-visible .bar-label { fill: var(--focus); text-decoration: underline; }\n.bar-label { font-family: var(--sans); font-size: 15.5px; font-weight: 600; fill: var(--ink); }\n.bar-value { font-family: var(--mono); font-size: 14.5px; font-weight: 500; fill: var(--ink-2); }\n.axis-tick { font-family: var(--mono); font-size: 13px; fill: var(--ink-3); }\n.zero-line { stroke: var(--ink-2); stroke-width: 1.2; }\n.zero-label { font-family: var(--mono); font-size: 13px; fill: var(--ink-3); letter-spacing: 0.04em; }\n\n.legend {\n  display: grid;\n  grid-template-columns: max-content 1fr max-content;\n  align-items: center;\n  gap: 8px 14px;\n  margin-top: 18px; padding-top: 16px;\n  border-top: 1px solid var(--rule-soft);\n  font-family: var(--mono);\n  font-size: 13px;\n  color: var(--ink-3);\n}\n.legend .legend-end {\n  font-family: var(--mono);\n  font-size: 13px;\n  text-transform: uppercase;\n  letter-spacing: 0.08em;\n  color: var(--ink-2);\n}\n.legend .legend-gradient {\n  height: 10px;\n  border-radius: 2px;\n  background: linear-gradient(to right,\n    var(--neg-3), var(--neg-2), var(--neg-1), var(--mid),\n    var(--pos-1), var(--pos-2), var( \n.rank-pivot .pivot-status {\n  margin-top: 12px;\n  padding-top: 12px;\n  border-top: 1px solid var(--rule-soft);\n  font-family: var(--mono);\n  font-size: 14px;\n  color: var(--ink-3);\n  display: flex;\n  flex-wrap: wrap;\n  gap: 6px 14px;\n  align-items: baseline;\n}\n.rank-pivot .pivot-status b { color: var(--ink); font-weight: 700; font-family: var(--sans); font-size: 15.5px; }\n.rank-pivot .pivot-status .caution-text { color: var(--warn); }\n\n.rank-list {\n  display: flex;\n  flex-direction: column;\n  gap: 10px;\n}\n.rank-card {\n  background: var(--panel);\n  border: 1px solid var(--rule);\n  border-radius: 6px;\n  padding: 18px 22px 20px;\n  display: grid;\n  grid-template-columns: 64px 1fr 110px;\n  gap: 20px;\n  align-items: start;\n  box-shadow: var(--shadow);\n  transition: transform 0.32s cubic-bezier(.2,.7,.2,1);\n}\n.rank-card .rank-num {\n  font-family: var(--mono);\n  font-size: 33.5px;\n  font-weight: 700;\n  color: var(--ink-3);\n  line-height: 1;\n  padding-top: 2px;\n}\n.rank-card .rank-num .of {\n  display: block;\n  font-size: 13px;\n  font-weight: 400;\n  color: var(--ink-3);\n  letter-spacing: 0.06em;\n  margin-top: 6px;\n  text-transform: uppercase;\n}\n.rank-card .body { min-width: 0; }\n.rank-card .body .meta {\n  display: flex;\n  align-items: center;\n  gap: 10px;\n  font-family: var(--mono);\n  font-size: 13px;\n  color: var(--ink-3);\n  text-transform: uppercase;\n  letter-spacing: 0.06em;\n  margin-bottom: 6px;\n}\n.rank-card .body .meta .dot {\n  display: inline-block; width: 8px; height: 8px; border-radius: 50%;\n}\n.rank-card .body h3 {\n  font-size: 20.5px;\n  margin-bottom: 10px;\n  color: var(--ink);\n}\n.rank-card .body .full {\n  font-size: 17px;\n  line-height: 1.55;\n  color: var(--ink-2);\n  text-wrap: pretty;\n}\n.rank-card .score-col {\n  text-align: right;\n  font-family: var(--mono);\n}\n.rank-card .score-col .score {\n  font-size: 38.5px;\n  font-weight: 700;\n  line-height: 1;\n}\n.rank-card .score-col .score.pos { color: var(--pos-3); }\n.rank-card .score-col .score.neg { color: var(--neg-3); }\n.rank-card .score-col .score.zero { color: var(--ink-3); }\n.rank-card .score-col .lbl {\n  font-size: 13px;\n  color: var(--ink-3);\n  text-transform: uppercase;\n  letter-spacing: 0.08em;\n  margin-top: 6px;\n  font-family: var(--sans);\n  font-weight: 600;\n}\n.rank-card .score-col .delta {\n  font-size: 13px;\n  color: var(--ink-3);\n  margin-top: 8px;\n  font-family: var(--mono);\n}\n.rank-card .score-col .delta .arrow.up   { color: var(--pos-3); }\n.rank-card .score-col .delta .arrow.down { color: var(--neg-3); }\n\n@media (max-width: 720px) {\n  .rank-card {\n    grid-template-columns: 44px 1fr;\n    gap: 12px;\n    padding: 14px 16px 16px;\n  }\n  .rank-card .score-col {\n    grid-column: 2;\n    text-align: left;\n    display: flex;\n    align-items: baseline;\n    gap: 12px;\n    margin-top: 4px;\n  }\n  .rank-card .score-col .score { font-size: 29px; }\n  .rank-card .score-col .lbl, .rank-card .score-col .delta { margin-top: 0; }\n  .rank-card .rank-num { font-size: 26.5px; }\n  .rank-pivot { position: static; }\n}\n\n/* ---------- Methodology footer ---------- */\nfooter.methodology {\n  margin-top: 36px;\n  padding-top: 22px;\n  border-top: 1px solid var(--rule);\n  font-size: 14.5px;\n  color: var(--ink-3);\n  line-height: 1.6;\n}\nfooter.methodology h4 {\n  font-size: 13px;\n  letter-spacing: 0.1em;\n  text-transform: uppercase;\n  color: var(--ink-2);\n  margin-bottom: 8px;\n}\nfooter.methodology .meth-grid {\n  display: grid;\n  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));\n  gap: 14px 28px;\n  margin-bottom: 14px;\n}\nfooter.methodology .meth-grid .item .k { color: var(--ink-3); font-family: var(--mono); font-size: 13px; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 2px; }\nfooter.methodology .meth-grid .item .v { color: var(--ink); font-size: 15.5px; font-family: var(--sans); font-weight: 600; }\nfooter.methodology .disclaimer { font-size: 14px; max-width: 90ch; }\n\n/* ---------- Tooltip ---------- */\n.tooltip {\n  position: fixed;\n  pointer-events: none;\n  background: var(--ink);\n  color: #f6f3ec;\n  padding: 8px 11px;\n  border-radius: 3px;\n  font-family: var(--sans);\n  font-size: 14.5px;\n  line-height: 1.4;\n  max-width: 280px;\n  z-index: 1000;\n  opacity: 0;\n  transition: opacity 0.1s;\n  box-shadow: 0 4px 16px rgba(0,0,0,0.18);\n}\n.tooltip.show { opacity: 1; }\n.tooltip .tip-score { font-family: var(--mono); font-weight: 700; font-size: 15.5px; margin-bottom: 4px; }\n.tooltip .tip-meta { color: rgba(246, 243, 236, 0.65); font-family: var(--mono); font-size: 13px; }\n\n/* ---------- Tablet/phone tweaks ---------- */\n@media (max-width: 720px) {\n  .view-head h2 { font-size: 21.5px; }\n  .bars-wrap { padding: 16px 12px 12px; }\n  .pair-grid { grid-template-columns: 1fr; }\n  .heat-table th.row-label-container { padding: 0;  min-width: 220px; max-width: 260px; position: sticky; left: 0; z-index: 2; }\n.heat-table .row-label { min-width: 180px; max-width: 200px; font-size: 14px; }\n  .heat-cell {\n  forced-color-adjust: none;\n  -ms-high-contrast-adjust: none; min-width: 38px; height: 32px; font-size: 13px; }\n}\n\n@media (prefers-reduced-motion: reduce) {\n  html { scroll-behavior: auto; }\n  *, *::before, *::after {\n    animation-duration: 0.01ms !important;\n    animation-iteration-count: 1 !important;\n    transition-duration: 0.01ms !important;\n  }\n  .view.active { animation: none; }\n  .detail-panel { transition: none; }\n}\n</style>\n\n\n<style>\n/* ---------- Webinar view ---------- */\n.webinar-wrap { background: var(--panel); border: 1px solid var(--rule); border-radius: 4px; box-shadow: var(--shadow); padding: 20px; max-width: 1100px; }\n.video-frame { position: relative; width: 100%; padding-bottom: 56.25%; height: 0; background: #000; border-radius: 4px; overflow: hidden; }\n.video-frame iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: 0; }\n</style>\n<style>\n/* ---------- Accessible slide deck (inside Webinar view) ---------- */\n.deck { margin-top: 30px; max-width: 820px; }\n.deck-intro { border-top: 2px solid var(--rule); padding-top: 22px; margin-bottom: 8px; }\n.deck-intro h3 { font-size: 22px; margin-bottom: 8px; }\n.deck-intro p { color: var(--ink-2); font-size: 15.5px; }\n.deck-toc { margin-top: 14px; font-family: var(--sans); font-size: 14.5px; display: flex; flex-wrap: wrap; gap: 8px 14px; align-items: baseline; }\n.deck-toc .toc-label { color: var(--ink-3); }\n.deck-toc a { color: var(--ink); text-decoration: underline; text-underline-offset: 2px; }\n.deck-toc a:hover { color: var(--focus); }\n\n.deck .slide { background: var(--surface); border: 1px solid var(--rule); border-radius: 6px;\n  box-shadow: var(--shadow); padding: 20px 22px; margin: 16px 0; }\n.deck .slide.divider { background: var(--ink); border-color: var(--ink); box-shadow: none; padding: 16px 22px; }\n.deck .slide.divider .slide-kicker { color: rgba(255,255,255,0.6); }\n.deck .slide.divider h4 { color: #fff; font-size: 21px; }\n.deck .slide-kicker { font-family: var(--mono); font-size: 12px; letter-spacing: .08em;\n  text-transform: uppercase; color: var(--ink-3); margin-bottom: 4px; }\n.deck .slide h4 { font-size: 18.5px; margin-bottom: 12px; text-wrap: balance; color: var(--ink); }\n.deck .slide > p { color: var(--ink-2); font-size: 15.5px; margin-bottom: 12px; }\n.deck .titleblock .people, .deck .people { list-style: none; padding: 0; margin: 6px 0; }\n.deck .people li { color: var(--ink-2); font-size: 15.5px; margin-bottom: 3px; }\n.deck .findings-list { margin: 0 0 0 2px; padding: 0; list-style: none; }\n.deck .findings-list li { color: var(--ink-2); font-size: 15.5px; margin-bottom: 10px; padding-left: 16px;\n  border-left: 3px solid var(--rule); }\n.deck .findings-list b { color: var(--ink); }\n\n.deck .q { color: var(--ink-2); font-size: 14px; margin-bottom: 12px; font-style: italic; }\n.deck .tnote { color: var(--ink-3); font-size: 13px; margin-top: 8px; }\n.deck .src { font-family: var(--sans); font-size: 12.5px; color: var(--ink-3); margin-top: 10px; }\n\n.deck .table-wrap { overflow-x: auto; }\n.deck table { width: 100%; border-collapse: collapse; font-size: 14.5px; margin-bottom: 4px; }\n.deck table + .q, .deck table + .src { margin-top: 10px; }\n.deck caption { text-align: left; font-family: var(--sans); font-weight: 700; color: var(--ink);\n  font-size: 15.5px; margin-bottom: 8px; }\n.deck thead th { background: var(--bg); color: var(--ink); font-family: var(--sans); font-weight: 700;\n  text-align: left; padding: 8px 11px; border-bottom: 2px solid var(--rule); vertical-align: bottom; white-space: nowrap; }\n.deck thead th.num { text-align: right; }\n.deck tbody th[scope=\"row\"] { font-family: var(--serif); font-weight: 600; color: var(--ink-2);\n  text-align: left; padding: 8px 11px; border-bottom: 1px solid var(--rule-soft); vertical-align: top; }\n.deck tbody td { padding: 8px 11px; border-bottom: 1px solid var(--rule-soft); color: var(--ink-2);\n  text-align: right; font-variant-numeric: tabular-nums; white-space: nowrap; }\n.deck tbody tr:hover { background: var(--bg); }\n.deck tr.totalrow th, .deck tr.totalrow td { font-weight: 700; color: var(--ink); background: #eef3f7; }\n.deck tr.grouprow th { background: #fff; color: var(--ink-3); font-family: var(--mono); font-size: 12px;\n  text-transform: uppercase; letter-spacing: .06em; padding: 10px 11px 4px; border: 0; }\n.deck td.pos, .deck .pos { color: var(--d-pos-3); font-weight: 700; }\n.deck td.neg, .deck .neg { color: var(--d-neg-2); font-weight: 700; }\n.deck .deck-bridge { background: var(--bg); border: 1px solid var(--rule); border-left: 3px solid var(--ink-2);\n  border-radius: 4px; padding: 14px 16px; margin: 16px 0; }\n.deck .deck-bridge p { color: var(--ink-2); font-size: 15px; margin: 0; }\n.deck .deck-bridge b { color: var(--ink); }\n@media (max-width: 640px) { .deck table { font-size: 13px; } .deck .slide { padding: 15px; } }\n</style>\n</head>\n<body>\n\n<a class=\"skip-link\" href=\"#main-content\">Skip to main content</a>\n\n<div class=\"shell\">\n\n  <header class=\"page-head\">\n    <h1>DFP Medicaid Messaging MaxDiff</h1>\n    <div class=\"meta-row\">\n      <span><b>n=1,147</b> likely voters</span>\n      <span><b>May 8–11, 2026</b></span>\n      <span><b>±3 pp</b> topline MOE</span>\n      <span>Data for Progress</span>\n    </div>\n    <div class=\"contact-row\">Questions? <a href=\"mailto:matthew@dataforprogress.org\">matthew@dataforprogress.org</a></div>\n  </header>\n\n  <nav class=\"tabs\" role=\"tablist\" aria-label=\"Views\">\n    <button id=\"tab-webinar\" role=\"tab\" aria-selected=\"true\" aria-controls=\"view-webinar\" data-tab=\"webinar\"><span class=\"tab-num\">01</span>Webinar</button>\n    <button id=\"tab-topline\" role=\"tab\" aria-selected=\"false\" aria-controls=\"view-topline\" data-tab=\"topline\"><span class=\"tab-num\">02</span>Topline ranking</button>\n    <button id=\"tab-subgroups\" role=\"tab\" aria-selected=\"false\" aria-controls=\"view-subgroups\" data-tab=\"subgroups\"><span class=\"tab-num\">03</span>Subgroup heatmap</button>\n    <button id=\"tab-fulltext\" role=\"tab\" aria-selected=\"false\" aria-controls=\"view-fulltext\" data-tab=\"fulltext\"><span class=\"tab-num\">04</span>Full text</button>\n  </nav>\n\n  <main id=\"main-content\" tabindex=\"-1\">\n\n  <!-- =========================================================\n       VIEW — WEBINAR RECORDING (default landing view)\n       ========================================================= -->\n  <section class=\"view active\" id=\"view-webinar\" role=\"tabpanel\" aria-labelledby=\"tab-webinar\" tabindex=\"0\">\n    <div class=\"view-head\">\n      <div>\n        <h2>Webinar recording</h2>\n        <p class=\"desc\">Matthew Cortland and Lew Blank from Data for Progress hosted this Medicaid webinar on May 28, 2026.</p>\n      </div>\n    </div>\n\n    <div class=\"webinar-wrap\">\n      <div class=\"video-frame\">\n        <iframe\n          src=\"https://www.youtube-nocookie.com/embed/qjNo_EUJqNU\"\n          title=\"Medicaid Messaging with Data for Progress — webinar recording (May 28, 2026)\"\n          loading=\"lazy\"\n          referrerpolicy=\"strict-origin-when-cross-origin\"\n          allow=\"accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share\"\n          allowfullscreen></iframe>\n      </div>\n    </div>\n  <div class=\"deck\" role=\"region\" aria-labelledby=\"deck-heading\"><div class=\"deck-intro\"><h3 id=\"deck-heading\">Full presentation slides</h3><p>More accessible version of the data from the slides:</p><nav class=\"deck-toc\" aria-label=\"Slide sections\"><span class=\"toc-label\">Jump to:</span> <a href=\"#sec-news\">Where voters get their news</a> <a href=\"#sec-popular\">Medicaid is popular &amp; resilient</a> <a href=\"#sec-understanding\">Understanding &amp; terminology</a> <a href=\"#sec-findings\">Key findings</a></nav></div><section class=\"slide\" id=\"slide-1\" aria-labelledby=\"s1\"><p class=\"slide-kicker\">Slide 1</p><h4 id=\"s1\">Medicaid</h4><div class=\"titleblock\"><p>Data for Progress webinar presentation.</p><ul class=\"people\"><li><b>Matthew Cortland</b>, Senior Fellow &middot; matthew@dataforprogress.org</li><li><b>Lew Blank</b>, Communications Strategist</li></ul><p class=\"src\">May 28, 2026</p></div></section><section class=\"slide\" id=\"slide-2\" aria-labelledby=\"s2\"><p class=\"slide-kicker\">Slide 2</p><h4 id=\"s2\">About Data for Progress</h4><p>Data for Progress is a research organization that works to improve how policymakers, the media, and the public understand public opinion and key policy issues. Led by a team of experts, DFP conducts rapid and methodologically innovative polling, data analysis, and focus groups to deepen the public’s understanding of voter attitudes, especially on underexplored social and economic issues.</p></section><section class=\"slide\" id=\"slide-3\" aria-labelledby=\"s3\"><p class=\"slide-kicker\">Slide 3</p><h4 id=\"s3\">Methodology</h4><p>The data in this presentation comes from Data for Progress’ national web panel surveys. For each survey, we recruit approximately 1,200 likely voters nationwide to complete an online survey, and then weight the data to be representative of likely voters in a 2026 midterm environment by age, gender, education, race, and urbanicity. The margin of error for all surveys featured in this presentation is ±3 percentage points.</p><p>The demographic breakdown below describes respondents from Data for Progress’ most recent national survey. (The deck also showed a map of respondents by county.)</p><p class=\"q sr-only\" id=\"d21436\">Data table.</p><table aria-describedby=\"d21436\"><caption>Respondent profile, most recent national survey</caption><thead><tr><th scope=\"col\">Characteristic</th><th scope=\"col\" class=\"num\">Breakdown</th></tr></thead><tbody><tr><th scope=\"row\">Gender</th><td>53% female, 47% male</td></tr><tr><th scope=\"row\">Race</th><td>70% White, 12% Black, 10% Latino</td></tr><tr><th scope=\"row\">Education</th><td>37% college, 63% non-college</td></tr><tr><th scope=\"row\">Age</th><td>33% under 45, 67% 45 and over</td></tr><tr><th scope=\"row\">Party</th><td>39% Democrat, 22% Independent, 40% Republican</td></tr><tr><th scope=\"row\">Urbanicity</th><td>31% rural, 37% suburban, 32% urban</td></tr><tr><th scope=\"row\">Cross-partisan status</th><td>15% cross-partisan, 85% non cross-partisan</td></tr></tbody></table></section><section class=\"slide\" id=\"slide-4\" aria-labelledby=\"s4\"><p class=\"slide-kicker\">Slide 4</p><h4 id=\"s4\">Universe — Likely Voters</h4><p>This research surveys Americans likely to participate in the 2026 elections (“likely voters”). We focus on this population because their attitudes shape the policy environment in which Medicaid operates, and because likely voters are the segment of the public whose views are most consequential for federal health policy decisions.</p><p>This research is presented for educational purposes. It does not constitute advocacy for or against any candidate for public office.</p></section><section class=\"slide divider\" id=\"sec-news\" aria-labelledby=\"s5\"><p class=\"slide-kicker\">Slide 5</p><h4 id=\"s5\">Where Likely Voters Get Their News</h4></section><section class=\"slide\" id=\"slide-6\" aria-labelledby=\"s6\"><p class=\"slide-kicker\">Slide 6</p><h4 id=\"s6\">Where Do Likely Voters Get Their News?</h4><p class=\"q\" id=\"d92085\">Survey question: “Please click on all of the sources of news that you have gotten news from about government and politics in the past few weeks. If you’re unsure, please do not click it.” Respondents could select multiple sources, so shares do not sum to 100%.</p><table aria-describedby=\"d92085\"><caption>Top media sources — all likely voters</caption><thead><tr><th scope=\"col\">News source</th><th scope=\"col\" class=\"num\">Share of likely voters</th></tr></thead><tbody><tr><th scope=\"row\">Broadcast news (ABC, CBS, NBC)</th><td>43%</td></tr><tr><th scope=\"row\">Local television news</th><td>42%</td></tr><tr><th scope=\"row\">YouTube</th><td>37%</td></tr><tr><th scope=\"row\">Facebook</th><td>37%</td></tr><tr><th scope=\"row\">Fox News</th><td>36%</td></tr><tr><th scope=\"row\">CNN</th><td>28%</td></tr><tr><th scope=\"row\">Local newspapers</th><td>19%</td></tr><tr><th scope=\"row\">TikTok</th><td>19%</td></tr><tr><th scope=\"row\">Instagram</th><td>19%</td></tr><tr><th scope=\"row\">MSNBC</th><td>19%</td></tr><tr><th scope=\"row\">X (formerly Twitter)</th><td>16%</td></tr><tr><th scope=\"row\">Podcasts</th><td>15%</td></tr><tr><th scope=\"row\">New York Times</th><td>14%</td></tr><tr><th scope=\"row\">NPR</th><td>11%</td></tr><tr><th scope=\"row\">Newsmax</th><td>9%</td></tr><tr><th scope=\"row\">Reddit</th><td>9%</td></tr><tr><th scope=\"row\">AI chatbots (Grok, Gemini, ChatGPT)</th><td>7%</td></tr><tr><th scope=\"row\">Snapchat</th><td>6%</td></tr><tr><th scope=\"row\">None of these</th><td>5%</td></tr><tr><th scope=\"row\">Telemundo or Univision</th><td>3%</td></tr><tr><th scope=\"row\">Discord or Twitch</th><td>3%</td></tr><tr><th scope=\"row\">Bluesky</th><td>2%</td></tr></tbody></table><p class=\"src\">Source: Data for Progress, April 3–May 19, 2026 survey of 10,508 U.S. likely voters.</p></section><section class=\"slide\" id=\"slide-7\" aria-labelledby=\"s7\"><p class=\"slide-kicker\">Slide 7</p><h4 id=\"s7\">Cross-Partisan Voters Have a Similar News Profile to Voters Overall</h4><p>Cross-partisan voters have a similar news profile to voters overall, but lean more heavily on broadcast and TV news. “Cross-partisan voters” are respondents who report normally voting about equally for candidates of both major parties; they are 15% of likely voters in this sample.</p><p class=\"q\" id=\"d29599\">Survey question: “Please click on all of the sources of news that you have gotten news from about government and politics in the past few weeks. If you’re unsure, please do not click it.” Respondents could select multiple sources, so shares do not sum to 100%.</p><table aria-describedby=\"d29599\"><caption>Top media sources — cross-partisan voters</caption><thead><tr><th scope=\"col\">News source</th><th scope=\"col\" class=\"num\">Share</th></tr></thead><tbody><tr><th scope=\"row\">Broadcast news (ABC, CBS, NBC)</th><td>50%</td></tr><tr><th scope=\"row\">Local television news</th><td>45%</td></tr><tr><th scope=\"row\">YouTube</th><td>34%</td></tr><tr><th scope=\"row\">Fox News</th><td>34%</td></tr><tr><th scope=\"row\">Facebook</th><td>32%</td></tr><tr><th scope=\"row\">CNN</th><td>29%</td></tr><tr><th scope=\"row\">Local newspapers</th><td>22%</td></tr><tr><th scope=\"row\">MSNBC</th><td>19%</td></tr><tr><th scope=\"row\">Instagram</th><td>18%</td></tr><tr><th scope=\"row\">TikTok</th><td>17%</td></tr><tr><th scope=\"row\">New York Times</th><td>16%</td></tr><tr><th scope=\"row\">X (formerly Twitter)</th><td>15%</td></tr><tr><th scope=\"row\">Podcasts</th><td>12%</td></tr><tr><th scope=\"row\">NPR</th><td>12%</td></tr><tr><th scope=\"row\">Reddit</th><td>9%</td></tr><tr><th scope=\"row\">AI chatbots (Grok, Gemini, ChatGPT)</th><td>8%</td></tr><tr><th scope=\"row\">None of these</th><td>7%</td></tr><tr><th scope=\"row\">Newsmax</th><td>6%</td></tr><tr><th scope=\"row\">Snapchat</th><td>6%</td></tr><tr><th scope=\"row\">Telemundo or Univision</th><td>4%</td></tr><tr><th scope=\"row\">Discord or Twitch</th><td>3%</td></tr><tr><th scope=\"row\">Bluesky</th><td>1%</td></tr></tbody></table><p class=\"src\">Source: Data for Progress, April 3–May 19, 2026 survey of 10,508 U.S. likely voters.</p></section><section class=\"slide\" id=\"slide-8\" aria-labelledby=\"s8\"><p class=\"slide-kicker\">Slide 8</p><h4 id=\"s8\">Younger Likely Voters Rely on Social Media for News</h4><p>Younger voters have a different news profile from likely voters overall. The top five sources for voters ages 18 to 34 are all social media platforms: YouTube, TikTok, Instagram, Facebook, and X.</p><p class=\"q\" id=\"d87439\">Survey question: “Please click on all of the sources of news that you have gotten news from about government and politics in the past few weeks. If you’re unsure, please do not click it.” Respondents could select multiple sources, so shares do not sum to 100%.</p><table aria-describedby=\"d87439\"><caption>Top media sources — voters ages 18 to 34</caption><thead><tr><th scope=\"col\">News source</th><th scope=\"col\" class=\"num\">Share</th></tr></thead><tbody><tr><th scope=\"row\">YouTube</th><td>54%</td></tr><tr><th scope=\"row\">TikTok</th><td>45%</td></tr><tr><th scope=\"row\">Instagram</th><td>43%</td></tr><tr><th scope=\"row\">Facebook</th><td>41%</td></tr><tr><th scope=\"row\">X (formerly Twitter)</th><td>34%</td></tr><tr><th scope=\"row\">CNN</th><td>31%</td></tr><tr><th scope=\"row\">Broadcast news (ABC, CB td><td>12%</td></tr></tbody></table></div><p class=\"src\">Source: Data for Progress, April 3–May 19, 2026 survey of 10,508 U.S. likely voters.</p></section><section class=\"slide\" id=\"slide-12\" aria-labelledby=\"s12\"><p class=\"slide-kicker\">Slide 12</p><h4 id=\"s12\">Online Organizing Drives More Action Than In-Person Organizing</h4><p>A higher share of younger voters under 45 have taken part in social or political actions organized online than ones organized in person (29% vs. 17%). The same pattern holds for voters 45 and over (12% vs. 7%).</p><p class=\"q\" id=\"d43095\">Survey question: “Have you participated in any social or political actions, such as protests, petitions, or community meetings, that were organized primarily through online platforms or through in-person methods? Select all that apply.” Respondents could select multiple actions, so rows do not sum to 100%.</p><table aria-describedby=\"d43095\"><caption>Participation in social or political actions, by age</caption><thead><tr><th scope=\"col\">Response</th><th scope=\"col\" class=\"num\">Under 45</th><th scope=\"col\" class=\"num\">45 and over</th></tr></thead><tbody><tr><th scope=\"row\">Organized primarily online</th><td>29%</td><td>12%</td></tr><tr><th scope=\"row\">Organized through in-person methods</th><td>17%</td><td>7%</td></tr><tr><th scope=\"row\">Have not participated in any</th><td>54%</td><td>80%</td></tr><tr><th scope=\"row\">Don’t know</th><td>4%</td><td>3%</td></tr></tbody></table><p class=\"src\">Source: Data for Progress, February 28–March 1, 2025 survey of 1,191 U.S. likely voters.</p></section><section class=\"slide divider\" id=\"sec-popular\" aria-labelledby=\"s13\"><p class=\"slide-kicker\">Slide 13</p><h4 id=\"s13\">Medicaid Is Popular and Resilient</h4></section><section class=\"slide\" id=\"slide-14\" aria-labelledby=\"s14\"><p class=\"slide-kicker\">Slide 14</p><h4 id=\"s14\">Everyone Loves Medicaid (2025)</h4><p>Voters of all demographic and political stripes hold an overwhelmingly favorable view of Medicaid, including Independents (+55), Republicans (+45), cross-partisan voters (+49), and both “somewhat” (+52) and “very” (+49) conservative voters.</p><p class=\"q\" id=\"d81108\">Survey question: “Do you have a favorable or unfavorable opinion of the following people or institutions? — Medicaid.” Net = favorable minus unfavorable.</p><table aria-describedby=\"d81108\"><caption>Favorability of Medicaid, by group (2025)</caption><thead><tr><th scope=\"col\">Group</th><th scope=\"col\" class=\"num\">Favorable</th><th scope=\"col\" class=\"num\">Unfavorable</th><th scope=\"col\" class=\"num\">Net</th></tr></thead><tbody><tr class=\"totalrow\"><th scope=\"row\">All likely voters</th><td>75%</td><td>14%</td><td class=\"pos\">+61</td></tr><tr><th scope=\"row\">Democrat</th><td>87%</td><td>7%</td><td class=\"pos\">+80</td></tr><tr><th scope=\"row\">Independent / third party</th><td>70%</td><td>15%</td><td class=\"pos\">+55</td></tr><tr><th scope=\"row\">Republican</th><td>66%</td><td>21%</td><td class=\"pos\">+45</td></tr><tr><th scope=\"row\">18 to 34</th><td>65%</td><td>17%</td><td class=\"pos\">+48</td></tr><tr><th scope=\"row\">35 to 59</th><td>76%</td><td>15%</td><td class=\"pos\">+61</td></tr><tr><th scope=\"row\">60+</th><td>77%</td><td>13%</td><td class=\"pos\">+64</td></tr><tr><th scope=\"row\">Cross-partisan voter</th><td>67%</td><td>18%</td><td class=\"pos\">+49</td></tr><tr><th scope=\"row\">Very liberal</th><td>86%</td><td>9%</td><td class=\"pos\">+77</td></tr><tr><th scope=\"row\">Somewhat liberal</th><td>87%</td><td>6%</td><td class=\"pos\">+81</td></tr><tr><th scope=\"row\">Moderate</th><td>71%</td><td>16%</td><td class=\"pos\">+55</td></tr><tr><th scope=\"row\">Somewhat conservative</th><td>71%</td><td>19%</td><td class=\"pos\">+52</td></tr><tr><th scope=\"row\">Very conservative</th><td>69%</td><td>20%</td><td class=\"pos\">+49</td></tr></tbody></table><p class=\"src\">Source: Data for Progress, February 14–15, 2025 survey of 1,215 U.S. likely voters.</p></section><section class=\"slide\" id=\"slide-15\" aria-labelledby=\"s15\"><p class=\"slide-kicker\">Slide 15</p><h4 id=\"s15\">…and in 2026</h4><p>In the latest test in March 2026, favorability for Medicaid is nearly identical.</p><p class=\"q\" id=\"d98453\">Survey question: “Do you have a favorable or unfavorable opinion of the following people or institutions? — Medicaid.” Net = favorable minus unfavorable.</p><table aria-describedby=\"d98453\"><caption>Favorability of Medicaid, by group (2026)</caption><thead><tr><th scope=\"col\">Group</th><th scope=\"col\" class=\"num\">Favorable</th><th scope=\"col\" class=\"num\">Unfavorable</th><th scope=\"col\" class=\"num\">Net</th></tr></thead><tbody><tr class=\"totalrow\"><th scope=\"row\">All likely voters</th><td>76%</td><td>17%</td><td class=\"pos\">+59</td></tr><tr><th scope=\"row\">Democrat</th><td>82%</td><td>12%</td><td class=\"pos\">+70</td></tr><tr><th scope=\"row\">Independent / third party</th><td>72%</td><td>17%</td><td class=\"pos\">+55</td></tr><tr><th scope=\"row\">Republican</th><td>73%</td><td>22%</td><td class=\"pos\">+51</td></tr><tr><th scope=\"row\">18 to 34</th><td>74%</td><td>17%</td><td class=\"pos\">+57</td></tr><tr><th scope=\"row\">35 to 59</th><td>75%</td><td>17%</td><td class=\"pos\">+58</td></tr><tr><th scope=\"row\">60+</th><td>76%</td><td>17%</td><td class=\"pos\">+59</td></tr><tr><th scope=\"row\">Very liberal</th><td>93%</td><td>4%</td><td class=\"pos\">+89</td></tr><tr><th scope=\"row\">Somewhat liberal</th><td>87%</td><td>9%</td><td class=\"pos\">+78</td></tr><tr><th scope=\"row\">Moderate</th><td>72%</td><td>19%</td><td class=\"pos\">+53</td></tr><tr><th scope=\"row\">Somewhat conservative</th><td>79%</td><td>14%</td><td class=\"pos\">+65</td></tr><tr><th scope=\"row\">Very conservative</th><td>59%</td><td>28%</td><td class=\"pos\">+31</td></tr></tbody></table><p class=\"src\">Source: Data for Progress, March 13–15, 2026 survey of 1,259 U.S. likely voters.</p></section><section class=\"slide\" id=\"slide-16\" aria-labelledby=\"s16\"><p class=\"slide-kicker\">Slide 16</p><h4 id=\"s16\">Almost No One Wants to Cut Medicaid and Home Care (2025)</h4><p>Across both Medicaid overall and home and community-based services (HCBS), large majorities want to increase or keep current funding, and very few support cuts.</p><p class=\"q\" id=\"d27288\">Survey question: “Lawmakers in Congress are considering funding levels for each of the following. For each, please say if you think we should increase or cut its federal funding, or if we should keep federal funding at its current level. — Medicaid.” Rows may not total 100% due to rounding.</p><table aria-describedby=\"d27288\"><caption>Federal funding for Medicaid — increase, keep, or cut (2025)</caption><thead><tr><th scope=\"col\">Group</th><th scope=\"col\" class=\"num\">Increase</th><th scope=\"col\" class=\"num\">Keep current</th><th scope=\"col\" class=\"num\">Cut</th><th scope=\"col\" class=\"num\">Don’t know</th></tr></thead><tbody><tr class=\"totalrow\"><th scope=\"row\">All likely voters</th><td>50%</td><td>38%</td><td>8%</td><td>5%</td></tr><tr><th scope=\"row\">Democrat</th><td>66%</td><td>29%</td><td>2%</td><td>3%</td></tr><tr><th scope=\"row\">Independent / third party</th><td>45%</td><td>44%</td><td>6%</td><td>5%</td></tr><tr><th scope=\"row\">Republican</th><td>37%</td><td>43%</td><td>14%</td><td>6%</td></tr><tr><th scope=\"row\">Female</th><td>52%</td><td>35%</td><td>7%</td><td>6%</td></tr><tr><th scope=\"row\">Male</th><td>48%</td><td>40%</td><td>8%</td><td>3%</td></tr><tr><th scope=\"row\">18 to 34</th><td>53%</td><td>36%</td><td>7%</td><td>4%</td></tr><tr><th scope=\"row\">35 to 59</th><td>58%</td><td>32%</td><td>6%</td><td>5%</td></tr><tr><th scope=\"row\">60+</th><td>42%</td><td>44%</td><td>10%</td><td>5%</td></tr><tr><th scope=\"row\">Cross-partisan voter</th><td>42%</td><td>45%</td><td>7%</td><td>6%</td></tr></tbody></table><p class=\"src\">Source: Data for Progress, 3 surveys, March 28–April 14, 2025, 3,552 interviews of U.S. likely voters.</p><p class=\"q\" id=\"d34441\">Survey question: “Home and community-based services (HCBS) allow aging adults and people with disabilities to live independently and receive care in their homes and communities. Do you think we should increase or cut federal funding for HCBS, or keep it at its current level?” Rows may not total 100% due to rounding.</p><table aria-describedby=\"d34441\"><caption>Federal funding for home &amp; community-based services (HCBS) — increase, keep, or cut (2025)</caption><thead><tr><th scope=\"col\">Group</th><th scope=\"col\" class=\"num\">Increase</th><th scope=\"col\" class=\"num\">Keep current</th><th scope=\"col\" class=\"num\">Cut</th><th scope=\"col\" class=\"num\">Don’t know</th></tr></thead><tbody><tr class=\"totalrow\"><th scope=\"row\">All likely voters</th><td>52%</td><td>38%</td><td>5%</td><td>5%</td></tr><tr><th scope=\"row\">Democrat</th><td>66%</td><td>27%</td><td>3%</td><td>4%</td></tr><tr><th scope=\"row\">Independent / third party</th><td>49%</td><td>41%</td><td>4%</td><td>6%</td></tr><tr><th scope=\"row\">Republican</th><td>42%</td><td>46%</td><td>7%</td><td>5%</td></tr><tr><th scope=\"row\">Female</th><td>57%</td><td>34%</td><td>4%</td><td>6%</td></tr><tr><th scope=\"row\">Male</th><td>48%</td><td>42%</td><td>6%</td><td>4%</td></tr><tr><th scope=\"row\">18 to 34</th><td>48%</td><td>39%</td><td>7%</td><td>6%</td></tr><tr><th scope=\"row\">35 to 59</th><td>53%</td><td>37%</td><td>6%</td><td>5%</td></tr><tr><th scope=\"row\">60+</th><td>54%</td><td>38%</td><td>3%</td><td>5%</td></tr><tr><th scope=\"row\">Cross-partisan voter</th><td>42%</td><td>47%</td><td>6%</td><td>5%</td></tr></tbody></table><p class=\"src\">Source: Data for Progress, 3 surveys, March 28–April 14, 2025, 3,552 interviews of U.S. likely voters.</p></section><section class=\"slide\" id=\"slide-17\" aria-labelledby=\"s17\"><p class=\"slide-kicker\">Slide 17</p><h4 id=\"s17\">…and in 2026</h4><p>In the latest test in May 2026, voters still oppose Medicaid cuts. This question used a finer scale (increased a lot / increased somewhat / kept at current level / reduced somewhat / reduced a lot / don’t know). The columns below combine the two “increased” and two “reduced” responses; net = increased minus reduced.</p><p class=\"q\" id=\"d47446\">Survey question: “Do you think federal funding for Medicaid should be increased, kept at the current level, or reduced?”</p><table aria-describedby=\"d47446\"><caption>Federal funding for Medicaid — increase vs. reduce (2026)</caption><thead><tr><th scope=\"col\">Group</th><th scope=\"col\" class=\"num\">Increased</th><th scope=\"col\" class=\"num\">Reduced</th><th scope=\"col\" class=\"num\">Net</th></tr></thead><tbody><tr class=\"totalrow\"><th scope=\"row\">All likely voters</th><td>54%</td><td>14%</td><td class=\"pos\">+40</td></tr><tr><th scope=\"row\">Democrat</th><td>68%</td><td>7%</td><td class=\"pos\">+61</td></tr><tr><th scope=\"row\">Independent / third party</th><td>51%</td><td>11%</td><td class=\"pos\">+40</td></tr><tr><th scope=\"row\">Republican</th><td>39%</td><td>23%</td><td class=\"pos\">+16</td></tr><tr><th scope=\"row\">Female</th><td>54%</td><td>12%</td><td class=\"pos\">+42</td></tr><tr><th scope=\"row\">Male</th><td>52%</td><td>16%</td><td class=\"pos\">+36</td></tr><tr><th scope=\"row\">18 to 34</th><td>47%</td><td>13%</td><td class=\"pos\">+34</td></tr><tr><th scope=\"row\">35 to 59</th><td>59%</td><td>13%</td><td class=\"pos\">+46</td></tr><tr><th scope=\"row\">60+</th><td>51%</td><td>16%</td><td class=\"pos\">+35</td></tr><tr><th scope=\"row\">Cross-partisan voter</th><td>44%</td><td>12%</td><td class=\"pos\">+32</td></tr></tbody></table><p class=\"src\">Source: Data for Progress, May 2026 survey of U.S. likely voters.</p></section><section class=\"slide\" id=\"slide-18\" aria-labelledby=\"s18\"><p class=\"slide-kicker\">Slide 18</p><h4 id=\"s18\">Support for Medicaid Is Resilient</h4><p>A strong majority of voters (61%), including a majority of Independents and a plurality of Republicans, say their top priority is making sure everyone who needs Medicaid can access care. Fewer than one-third (30%) prioritize preventing fraud over access.</p><p class=\"q\" id=\"d68283\">Survey question: “Which is more important to you? (A) Making sure everyone who needs Medicaid can access care, even if some taxpayer money is lost to fraud; or (B) Making sure no taxpayer money is wasted on fraud in Medicaid, even if some people who need care temporarily lose access.” Net = access first minus fraud-prevention first.</p><table aria-describedby=\"d68283\"><caption>More important: protecting access or preventing fraud, by group</caption><thead><tr><th scope=\"col\">Group</th><th scope=\"col\" class=\"num\">Access first</th><th scope=\"col\" class=\"num\">Fraud-prevention first</th><th scope=\"col\" class=\"num\">Don’t know</th><th scope=\"col\" class=\"num\">Net</th></tr></thead><tbody><tr class=\"totalrow\"><th scope=\"row\">All likely voters</th><td>61%</td><td>30%</td><td>9%</td><td class=\"pos\">+31</td></tr><tr><th scope=\"row\">Democrat</th><td>72%</td><td>19%</td><td>9%</td><td class=\"pos\">+53</td></tr><tr><th scope=\"row\">Independent / third party</th><td>64%</td><td>23%</td><td>13%</td><td class=\"pos\">+41</td></tr><tr><th scope=\"row\">Republican</th><td>48%</td><td>45%</td><td>7%</td><td class=\"pos\">+3</td></tr><tr><th scope=\"row\">Female</th><td>64%</td><td>25%</td><td>11%</td><td class=\"pos\">+39</td></tr><tr><th scope=\"row\">Male</th><td>58%</td><td>35%</td><td>7%</td><td class=\"pos\">+23</td></tr><tr><th scope=\"row\">18 to 34</th><td>62%</td><td>31%</td><td>7%</td><td class=\"pos\">+31</td></tr><tr><th scope=\"row\">35 to 59</th><td>60%</td><td>28%</td><td>11%</td><td class=\"pos\">+32</td></tr><tr><th scope=\"row\">60+</th><td>62%</td><td>31%</td><td>8%</td><td class=\"pos\">+31</td></tr></tbody></table><p class=\"src\">Source: Data for Progress, March 13–15, 2026 survey of 1,259 U.S. likely voters.</p></section><section class=\"slide\" id=\"slide-19\" aria-labelledby=\"s19\"><p class=\"slide-kicker\">Slide 19</p><h4 id=\"s19\">Public Response to Sec. Kennedy’s Federal Health Policy</h4><p>Initially, 45% of voters view Robert F. Kennedy Jr. favorably and 48% unfavorably (net −3). A factual vaccine-policy message moves his net favorability by −8 points; a Medicaid-policy message moves it by −29 points.</p><p class=\"q\" id=\"d21213\">Initial question: “Do you have a favorable or unfavorable opinion of Robert F. Kennedy Jr.?” Voters were then split at random; each group saw one message and was asked again. Vaccine message: he “has withdrawn longstanding guidelines for routine childhood vaccines and claimed autism is linked to vaccines and Tylenol.” Medicaid message: he “has campaigned to cut funding for Medicaid, including home care services for seniors and people with disabilities.” Net = favorable minus unfavorable.</p><table aria-describedby=\"d21213\"><caption>Robert F. Kennedy Jr. favorability — All likely voters</caption><thead><tr><th scope=\"col\">Condition</th><th scope=\"col\" class=\"num\">Favorable</th><th scope=\"col\" class=\"num\">Unfavorable</th><th scope=\"col\" class=\"num\">Net</th></tr></thead><tbody><tr><th scope=\"row\">Initial opinion</th><td>45%</td><td>48%</td><td class=\"neg\">−3</td></tr><tr><th scope=\"row\">After vaccine message</th><td>42%</td><td>50%</td><td class=\"neg\">−8</td></tr><tr><th scope=\"row\">After Medicaid message</th><td>31%</td><td>60%</td><td class=\"neg\">−29</td></tr></tbody></table><p class=\"q sr-only\" id=\"d74795\">Data table.</p><table aria-describedby=\"d74795\"><caption>Robert F. Kennedy Jr. favorability — Democratic voters</caption><thead><tr><th scope=\"col\">Condition</th><th scope=\"col\" class=\"num\">Favorable</th><th scope=\"col\" class=\"num\">Unfavorable</th><th scope=\"col\" class=\"num\">Net</th></tr></thead><tbody><tr><th scope=\"row\">Initial opinion</th><td>19%</td><td>75%</td><td class=\"neg\">−56</td></tr><tr><th scope=\"row\">After vaccine message</th><td>20%</td><td>73%</td><td class=\"neg\">−53</td></tr><tr><th scope=\"row\">After Medicaid message</th><td>11%</td><td>81%</td><td class=\"neg\">−70</td></tr></tbody></table><p class=\"q sr-only\" id=\"d82714\">Data table.</p><table aria-describedby=\"d82714\"><caption>Robert F. Kennedy Jr. favorability — Independent voters</caption><thead><tr><th scope=\"col\">Condition</th><th scope=\"col\" class=\"num\">Favorable</th><th scope=\"col\" class=\"num\">Unfavorable</th><th scope=\"col\" class=\"num\">Net</th></tr></thead><tbody><tr><th scope=\"row\">Initial opinion</th><td>44%</td><td>47%</td><td class=\"neg\">−3</td></tr><tr><th scope=\"row\">After vaccine message</th><td>42%</td><td>48%</td><td class=\"neg\">−6</td></tr><tr><th scope=\"row\">After Medicaid message</th><td>22%</td><td>67%</td><td class=\"neg\">−45</td></tr></tbody></table><p class=\"q sr-only\" id=\"d41676\">Data table.</p><table aria-describedby=\"d41676\"><caption>Robert F. Kennedy Jr. favorability — Republican voters</caption><thead><tr><th scope=\"col\">Condition</th><th scope=\"col\" class=\"num\">Favorable</th><th scope=\"col\" class=\"num\">Unfavorable</th><th scope=\"col\" class=\"num\">Net</th></tr></thead><tbody><tr><th scope=\"row\">Initial opinion</th><td>72%</td><td>19%</td><td class=\"pos\">+53</td></tr><tr><th scope=\"row\">After vaccine message</th><td>66%</td><td>25%</td><td class=\"pos\">+41</td></tr><tr><th scope=\"row\">After Medicaid message</th><td>54%</td><td>34%</td><td class=\"pos\">+20</td></tr></tbody></table><p class=\"src\">Source: Data for Progress, May 1–4, 2026 survey of 1,159 U.S. likely voters.</p></section><section class=\"slide divider\" id=\"sec-understanding\" aria-labelledby=\"s20\"><p class=\"slide-kicker\">Slide 20</p><h4 id=\"s20\">Public Understanding of Medicaid: Terminology and Framing</h4></section><section class=\"slide\" id=\"slide-21\" aria-labelledby=\"s21\"><p class=\"slide-kicker\">Slide 21</p><h4 id=\"s21\">Finding #1: “Home Care,” Not “HCBS”</h4><p>Most voters (59%) are confident they know what “Medicaid home care services” are, but only 32% say the same about “Medicaid HCBS services.”</p><p class=\"q\" id=\"d42892\">Survey question: “How confident or unconfident are you that you know what [Medicaid home care services / Medicaid HCBS services] are?” Net = confident minus not confident.</p><table aria-describedby=\"d42892\"><caption>Confidence in knowing the term, home care vs. HCBS</caption><thead><tr><th scope=\"col\">Term</th><th scope=\"col\" class=\"num\">Confident</th><th scope=\"col\" class=\"num\">Not confident</th><th scope=\"col\" class=\"num\">Net</th></tr></thead><tbody><tr><th scope=\"row\">Medicaid home care services</th><td>59%</td><td>36%</td><td class=\"pos\">+23</td></tr><tr><th scope=\"row\">Medicaid HCBS services</th><td>32%</td><td>57%</td><td class=\"neg\">−25</td></tr></tbody></table><p class=\"src\">Source: Data for Progress, May 22–24, 2026 survey of 610 U.S. likely voters.</p></section><section class=\"slide\" id=\"slide-22\" aria-labelledby=\"s22\"><p class=\"slide-kicker\">Slide 22</p><h4 id=\"s22\">Finding #2: “Work Requirements” Framing Matters</h4><p>Voters support a Medicaid “work requirement” by +6 points on net, but oppose the same policy by −15 points when it is described as a “job loss penalty.”</p><p class=\"q\" id=\"d23866\">Survey question: “Some lawmakers are considering changes to Medicaid that would require certain recipients to work, volunteer, or train for a job to keep their coverage.” Half of respondents were asked about a “work requirement” and half about a “job loss penalty.” Net = support minus oppose.</p><table aria-describedby=\"d23866\"><caption>Support for the same policy under two framings</caption><thead><tr><th scope=\"col\">Framing</th><th scope=\"col\" class=\"num\">Support</th><th scope=\"col\" class=\"num\">Oppose</th><th scope=\"col\" class=\"num\">Net</th></tr></thead><tbody><tr><th scope=\"row\">Medicaid “work requirement”</th><td>50%</td><td>44%</td><td class=\"pos\">+6</td></tr><tr><th scope=\"row\">Medicaid “job loss penalty”</th><td>38%</td><td>53%</td><td class=\"neg\">−15</td></tr></tbody></table><p class=\"src\">Source: Data for Progress, April 18–21, 2025 survey of 595 U.S. likely voters.</p></section><section class=\"slide\" id=\"slide-23\" aria-labelledby=\"s23\"><p class=\"slide-kicker\">Slide 23</p><h4 id=\"s23\">Finding #3: Most Voters Are Unaware of Medicaid Cuts</h4><p>In October 2025, three months after President Trump signed the One Big Beautiful Bill Act, fewer than half of voters (49%) correctly identified that he decreased spending on health care programs like Medicaid. A majority said he made no change (22%), increased spending (11%), or didn’t know (18%).</p><p class=\"q\" id=\"d769\">Survey question: “To the best of your knowledge, in the past year, has President Donald Trump increased or decreased U.S. government spending on health care programs such as Medicaid, or has he made no change?” Rows may not total 100% due to rounding.</p><table aria-describedby=\"d769\"><caption>Perception of Trump’s health care spending, by group</caption><thead><tr><th scope=\"col\">Group</th><th scope=\"col\" class=\"num\">Decreased</th><th scope=\"col\" class=\"num\">No change</th><th scope=\"col\" class=\"num\">Increased</th><th scope=\"col\" class=\"num\">Don’t know</th></tr></thead><tbody><tr class=\"totalrow\"><th scope=\"row\">All likely voters</th><td>49%</td><td>22%</td><td>11%</td><td>18%</td></tr><tr><th scope=\"row\">Democrat</th><td>66%</td><td>15%</td><td>8%</td><td>11%</td></tr><tr><th scope=\"row\">Independent / third party</th><td>54%</td><td>18%</td><td>8%</td><td>20%</td></tr><tr><th scope=\"row\">Republican</th><td>28%</td><td>32%</td><td>16%</td><td>25%</td></tr><tr><th scope=\"row\">Female</th><td>50%</td><td>20%</td><td>9%</td><td>21%</td></tr><tr><th scope=\"row\">Male</th><td>47%</td><td>24%</td><td>13%</td><td>15%</td></tr><tr><th scope=\"row\">18 to 34</th><td>40%</td><td>17%</td><td>19%</td><td>25%</td></tr><tr><th scope=\"row\">35 to 59</th><td>46%</td><td>20%</td><td>13%</td><td>20%</td></tr><tr><th scope=\"row\">60+</th><td>55%</td><td>25%</td><td>6%</td><td>14%</td></tr><tr><th scope=\"row\">Cross-partisan voter</th><td>61%</td><td>21%</td><td>6%</td><td>12%</td></tr></tbody></table><p class=\"src\">Source: Data for Progress, October 31–November 3, 2025 survey of 1,228 U.S. likely voters.</p></section><section class=\"slide\" id=\"slide-24\" aria-labelledby=\"s24\"><p class=\"slide-kicker\">Slide 24</p><h4 id=\"s24\">Finding #4: Voters Often Do Not Recognize ‘Rebranded’ Medicaid</h4><p>Many voters live in states whose Medicaid program goes by a different name, such as “MaineCare” in Maine or “BadgerCare” in Wisconsin. Only 62% of voters in these states correctly identify that the program is Medicaid.</p><p class=\"q\" id=\"d91129\">Survey question: “To the best of your knowledge, what type of program is [state Medicaid name]?” Asked only of respondents who live in a state whose Medicaid program does not contain “Medicaid” in its name.</p><table aria-describedby=\"d91129\"><caption>What type of program is your state’s [renamed Medicaid]?</caption><thead><tr><th scope=\"col\">Response</th><th scope=\"col\" class=\"num\">Share</th></tr></thead><tbody><tr><th scope=\"row\">A Medicaid program</th><td>62%</td></tr><tr><th scope=\"row\">An advocacy campaign to promote healthy lifestyles</th><td>5%</td></tr><tr><th scope=\"row\">A private, employer-sponsored health insurance program</th><td>5%</td></tr><tr><th scope=\"row\">A private statewide network of hospitals</th><td>4%</td></tr><tr><th scope=\"row\">A food and nutrition assistance program</th><td>4%</td></tr><tr><th scope=\"row\">None of these</th><td>4%</td></tr><tr><th scope=\"row\">Don’t know</th><td>16%</td></tr></tbody></table><p class=\"src\">Source: Data for Progress, April 18–20, 2025 survey of 472 U.S. likely voters in states with a renamed Medicaid program.</p></section><div class=\"deck-bridge\" role=\"note\"><p><b>MaxDiff message testing.</b> The webinar’s MaxDiff results — the ranking of 14 messages opposing the Medicaid “waste, fraud, and abuse” campaign — are not repeated here. They are presented in full, and interactively, in the <b>Topline ranking</b>, <b>Subgroup heatmap</b>, and <b>Full text</b> tabs at the top of this page.</p></div><section class=\"slide divider\" id=\"sec-findings\" aria-labelledby=\"s30\"><p class=\"slide-kicker\">Slide 30</p><h4 id=\"s30\">Key Findings</h4></section><section class=\"slide\" id=\"slide-31\" aria-labelledby=\"s31\"><p class=\"slide-kicker\">Slide 31</p><h4 id=\"s31\">Key Findings</h4><ul class=\"findings-list\"><li><b>Voters get political news from both TV and social media.</b> Younger voters in particular rely on platforms like YouTube and TikTok, and a notable share (17% of those 18–34) get news from AI chatbots.</li><li><b>Medicaid is broadly popular with the electorate.</b> Voters prioritize Medicaid access over fraud-prevention concerns, even when the two are presented as competing priorities.</li><li><b>Voter understanding of Medicaid is uneven and depends heavily on terminology.</b> Voters recognize “home care,” not “HCBS” jargon, and response to the same policy shifts substantially between a “work requirement” and a “job loss penalty.”</li><li><b>Public awareness of recent federal Medicaid changes is low.</b> Many voters do not recognize that their state-branded program (e.g. BadgerCare, MaineCare) is Medicaid.</li></ul></section><section class=\"slide\" id=\"slide-32\" aria-labelledby=\"s32\"><p class=\"slide-kicker\">Slide 32</p><h4 id=\"s32\">Stay in Touch</h4><ul class=\"people\"><li>matthew@dataforprogress.org</li><li>lew@dataforprogress.org</li><li>Bluesky: @dataforprogress.org &middot; X: @dataprogress &middot; Instagram: @dataforprogress</li></ul></section></div></section>\n\n\n  <!-- =========================================================\n       VIEW 1 — TOPLINE\n       ========================================================= -->\n  <section class=\"view\" id=\"view-topline\" role=\"tabpanel\" aria-labelledby=\"tab-topline\" tabindex=\"0\">\n    <div class=\"view-head\">\n      <div>\n        <h2>All 14 messages, ranked by topline utility</h2>\n        <p class=\"desc\">\n          Sorted by score among all 1,147 respondents. Bar color runs from less convincing to more\n          convincing along the same diverging scale used in the heatmap.\n        </p>\n      </div>\n    </div>\n\n    <div class=\"bars-wrap\">\n      <div id=\"topline-chart\" aria-describedby=\"topline-chart-note\"></div>\n      <p class=\"sr-only\" id=\"topline-chart-note\">Use Tab to move through the bars, then press Enter or Space to open message details.</p>\n      <div class=\"legend\" id=\"topline-legend\"></div>\n    </div>\n  </section>\n\n  <!-- =========================================================\n       VIEW 2 — HEATMAP\n       ========================================================= -->\n  <section class=\"view\" id=\"view-subgroups\" role=\"tabpanel\" aria-labelledby=\"tab-subgroups\" tabindex=\"0\" hidden>\n    <div class=\"view-head\">\n      <div>\n        <h2>Subgroup heatmap</h2>\n      </div>\n    </div>\n\n    <div class=\"heat-layout\">\n      <div>\n        <div class=\"heat-wrap\">\n          <div id=\"heat-table-wrap\"></div>\n        </div>\n        <div class=\"heat-legend\" id=\"heat-legend\"></div>\n      </div>\n    </div>\n  </section>\n\n  <!-- =========================================================\n       VIEW 3 — FULL TEXT (pivot by subgroup)\n       ========================================================= -->\n  <section class=\"view\" id=\"view-fulltext\" role=\"tabpanel\" aria-labelledby=\"tab-fulltext\" tabindex=\"0\" hidden>\n    <div class=\"view-head\">\n      <div>\n        <h2>Full text of every message, ranked</h2>\n        <p class=\"desc\">\n          The complete wording of all 14 statements as respondents saw them, ordered by score.\n        </p>\n      </div>\n    </div>\n\n    <div class=\"survey-prompt\" aria-labelledby=\"survey-prompt-label\">\n      <div class=\"sp-label\" id=\"survey-prompt-label\">Prompt shown to respondents</div>\n      <p>Medicaid is a government health insurance program covering about 68 million Americans. The Trump administration, through Health Secretary Robert F. Kennedy Jr. and Medicaid Administrator Mehmet Oz, has launched a campaign against what it calls waste, fraud, and abuse in Medicaid.</p>\n      <p>Supporters say these actions protect taxpayer dollars by rooting out fraud and preserve Medicaid for those who truly need it the most.</p>\n      <p>Below are statements in opposition to the Trump administration’s approach. For each set of statements, please pick which you find most convincing and which you find least convincing as a reason to oppose the administration’s approach.</p>\n    </div>\n\n    <div class=\"rank-pivot\" id=\"rank-pivot\"></div>\n    <div class=\"rank-list\" id=\"rank-list\"></div>\n  </section>\n\n  </main>\n\n  <!-- Shared detail drawer (overlays from any tab) -->\n  <div class=\"detail-backdrop\" id=\"detail-backdrop\"></div>\n  <aside class=\"detail-panel\" id=\"detail-panel\" role=\"dialog\" aria-modal=\"true\" aria-labelledby=\"detail-title\" aria-describedby=\"detail-desc\" aria-hidden=\"true\" tabindex=\"-1\"></aside>\n\n</div>\n\n<script src=\"13f1d616-95ec-487e-8546-fdd4ea22ad22\"><\/script>\n<script src=\"1164fb0d-87bd-4885-9d76-05d3c0ac3402\"><\/script>\n\n\n</body></html>\n"</script>
